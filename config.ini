; GuardianGrid Configuration File
; Update these values to customize your website

[site]
; Website metadata
name = "S&N GuardianGrid"
description = "AI-powered CCTV monitoring and security solution"
url = "https://guardiangrid.com"
timezone = "Asia/Kolkata"

[contact]
; Contact form settings
email = "contact@guardiangrid.com"
support_phone = "+91-XXXX-XXXX-XXXX"
location = "Bangalore, India"

[business]
; Business information
company_name = "S&N GuardianGrid Technologies"
year_founded = 2023

[features]
; Feature toggles
enable_3d_animation = true
enable_animations = true
enable_form_logging = true
enable_email_notification = true

[pricing]
; Pricing plans (in INR)
plan_basic = 8999
plan_regular = 14999
plan_premium = 19999
plan_supreme = 24999

[social]
; Social media links
facebook = "https://facebook.com/guardiangrid"
twitter = "https://twitter.com/guardiangrid"
linkedin = "https://linkedin.com/company/guardiangrid"
instagram = "https://instagram.com/guardiangrid"

[performance]
; Performance settings
enable_gzip = true
enable_cache = true
cache_duration = 3600
min_log_level = "INFO"

[security]
; Security settings
allowed_origins = "*"
csrf_protection = true
rate_limit_per_minute = 5
log_ip_address = true
